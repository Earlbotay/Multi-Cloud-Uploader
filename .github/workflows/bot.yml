name: Multi-Cloud Bot with Local API

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

concurrency:
  group: bot-concurrency
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install python-telegram-bot==20.3 requests
      
      - name: Cache Bot Data
        uses: actions/cache@v4
        with:
          path: bot_cache
          key: bot-cache-${{ github.run_id }}
          restore-keys: |
            bot-cache-

      - name: Run Telegram Bot API Server
        run: |
          # Create shared data directory
          mkdir -p $(pwd)/telegram-data
          chmod 777 $(pwd)/telegram-data
          
          if [ "$(docker ps -q -f name=telegram-bot-api)" ]; then
            echo "Pelayan sudah berjalan. Melangkau langkah lari Docker."
          else
            if [ "$(docker ps -aq -f status=exited -f name=telegram-bot-api)" ]; then
              echo "Memulakan semula pelayan yang terhenti..."
              docker start telegram-bot-api
            else
              echo "Memulakan pelayan baru..."
              docker run -d -p 8081:8081 --name telegram-bot-api \
                -v $(pwd)/telegram-data:/var/lib/telegram-bot-api \
                -e TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }} \
                -e TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }} \
                aiogram/telegram-bot-api:latest \
                --local --dir /var/lib/telegram-bot-api
            fi
          fi
          
          # Semakan kesihatan pelayan
          echo "Menyemak status pelayan..."
          sleep 5
          docker ps -a

      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          # Path seen by the bot on the runner host
          TELEGRAM_DATA_DIR: ${{ github.workspace }}/telegram-data
        run: |
          mkdir -p bot_cache
          python bot.py
