name: Multi-Cloud Bot with Local API

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install python-telegram-bot==20.3 requests
      
      - name: Cache Bot Data
        uses: actions/cache@v4
        with:
          path: bot_cache
          key: bot-cache-${{ github.run_id }}
          restore-keys: |
            bot-cache-

      - name: Run Telegram Bot API Server
        run: |
          docker run -d -p 8081:8081 --name telegram-bot-api \
            -e TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }} \
            -e TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }} \
            aiogram/telegram-bot-api:latest
          
          # Wait for server to start
          sleep 10
          docker logs telegram-bot-api

      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          # Create cache dir if restored cache is missing
          mkdir -p bot_cache
          python bot.py
